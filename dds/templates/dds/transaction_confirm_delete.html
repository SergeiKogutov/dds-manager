{% extends 'base.html' %}

{% block title %}Удаление записи — ДДС Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center py-4">
                <i class="bi bi-exclamation-triangle text-warning display-4"></i>
                <h1 class="h5 mt-3">Удалить запись?</h1>
                <p class="text-muted mb-4">
                    {{ object.date|date:"d.m.Y" }} — {{ object.amount }} р.
                    ({{ object.category.name }} / {{ object.subcategory.name }})
                </p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Удалить</button>
                    <a href="{% url 'transaction_list' %}" class="btn btn-outline-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
